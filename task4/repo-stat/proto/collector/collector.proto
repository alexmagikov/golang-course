syntax = "proto3";

package collector;

option go_package = "proto/collector";

service CollectorService {
  rpc Ping(PingRequest) returns (PingResponse);

  rpc GetRepo(GetRepoRequest) returns (GetRepoResponse);

  rpc GetSubscriptionsInfo(GetSubInfoRequest) returns (GetSubInfoResponse);
}

message PingRequest {
}

message GetSubInfoRequest {
}

message PingResponse {
  string reply = 1;
}

message GetRepoRequest {
  string owner = 1;
  string name = 2;
}

message GetRepoResponse {
  Repo repo = 1;
}

message GetSubInfoResponse {
  repeated Repo repos = 1;
}

message Repo {
  string name = 1;
  string description = 2;
  int64 stars = 3;
  int64 forks = 4;
  string created_at = 5;
}